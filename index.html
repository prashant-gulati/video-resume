let cur = -1;

function buildTimeline() {
  const tl = document.getElementById('timeline');
  // keep the track element, append stops after it
  stops.forEach((label, i) => {
    const idx = i - 1; // -1 = intro, 0..9 = chapters
    const el = document.createElement('div');
    el.className = 'ch-stop';
    el.setAttribute('data-i', idx);
    el.onclick = () => goTo(idx);
    el.innerHTML = `<div class="stop-dot"></div><span class="stop-lbl">${label}</span>`;
    tl.appendChild(el);
  });
}

function updateBar(idx) {
  const label = document.getElementById('bar-label');
  const count = document.getElementById('bar-count');
  const fill = document.getElementById('tl-fill');
  const allStops = document.querySelectorAll('.ch-stop');

  if (idx === -1) {
    label.textContent = 'Intro';
    count.textContent = 'Prashant Gulati';
    fill.style.width = '0px';
  } else {
    label.textContent = stops[idx + 1];
    count.innerHTML = `<span class="cur">${String(idx + 1).padStart(2,'0')}</span> / 9`;
    const activeEl = document.querySelector(`.ch-stop[data-i="${idx}"]`);
    if (activeEl) {
      // fill exactly up to the centre of the active dot
      fill.style.width = (activeEl.offsetLeft + activeEl.offsetWidth / 2) + 'px';
    }
  }

  allStops.forEach(s => {
    const i = parseInt(s.getAttribute('data-i'), 10);
    s.classList.remove('active', 'visited');
    if (i < idx) s.classList.add('visited');
    if (i === idx) {
      s.classList.add('active');
      s.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    }
  });
}

      const isImgPath = c.image && /\.(jpg|jpeg|png|svg|gif|webp)$/i.test(c.image);
      const imgInner = isImgPath
        ? `<img src="${c.image}" alt="" style="object-fit:${c.fit || 'cover'}">`
        : (c.image || 'image');
      const tag = c.link ? 'a' : 'div';
      const attrs = c.link ? ` href="${c.link}" target="_blank" rel="noopener"` : '';
      const linkIcon = c.link ? `<span class="card-link-icon"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7"/><path d="M8 7h9v9"/></svg></span>` : '';
      return `
      <${tag} class="img-card${c.link ? ' is-link' : ''}"${attrs}>
        ${linkIcon}
        <div class="img-card-img">${imgInner}</div>
        <div class="img-card-body">
          ${tagsHTML ? `<div class="card-tags">${tagsHTML}</div>` : ''}
          <div class="card-title">${c.title}</div>
          <div class="card-desc">${c.desc}</div>
        </div>
      </${tag}>`;
    }).join('');
  }
  document.getElementById('screen').innerHTML = `
    <div class="ch-body">
      <div class="ch-main">
        <div class="ch-eyebrow">
          ${logoMarkup(ch.logo)}
          <div class="eyebrow-text">
            <span class="ch-sub">${ch.eyebrow}</span>
            ${flags[idx + 1] ? `<span class="ch-flag">${flags[idx + 1]}</span>` : ''}
          </div>
        </div>
        ${headlineHTML.trim() ? `<div class="${headlineClass}">${headlineHTML}</div>` : ''}
        ${ch.subtitle ? `<div class="ch-subtitle">${ch.subtitle}</div>` : ''}
      </div>
      ${ch.takeaway ? `
      <div class="takeaway-card">
        <div class="tw-label"><div class="tw-dot"></div> The Takeaway</div>
        <div class="tw-text">${ch.takeaway}</div>
      </div>` : ''}
    </div>
    <div class="content-cards">${cardsHTML}</div>
    <div class="ch-bottom-pad"></div>`;
}

function goTo(idx) {
  cur = idx;
  updateBar(idx);
  if (idx === -1) renderIntro();
  else renderChapter(idx);
}

buildTimeline();
goTo(-1);

// Arrow-key navigation: ← previous, → next (intro = -1 … last chapter = 8)
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' && cur < chapters.length - 1) goTo(cur + 1);
  else if (e.key === 'ArrowLeft' && cur > -1) goTo(cur - 1);
});

// Video bubble: click to play/pause
(function () {
  const wrap = document.getElementById('rw-photo');
  const video = document.getElementById('bubble-video');
  if (!wrap || !video) return;
  wrap.addEventListener('click', () => {
    if (video.paused) video.play(); else video.pause();
  });
  video.addEventListener('play', () => wrap.classList.add('playing'));
  video.addEventListener('pause', () => wrap.classList.remove('playing'));
  video.addEventListener('ended', () => wrap.classList.remove('playing'));
})();
</script>
